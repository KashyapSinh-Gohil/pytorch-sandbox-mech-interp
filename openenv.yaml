# FINAL: explicit 4-task / 4-grader declaration for hackathon validation.
version: "1.0"
spec_version: 1
openenv_version: "0.2.2"
name: mech_interp
description: PyTorchSandbox mechanistic interpretability benchmark with four graded tasks.
type: space
runtime: fastapi
app: server.app:app
port: 8000
action: MechInterpAction
observation: MechInterpObservation
state: InterpState
action_type: models.MechInterpAction
observation_type: models.MechInterpObservation
state_type: models.InterpState
max_episode_steps: 30
environment: server.mech_interp_environment:MechInterpEnvironment
tasks:
  - id: task1
    name: dead_neuron_detection
    title: Dead Neuron Detection
    description: Find all zero-weight input indices in the Linear(10,1) model.
    difficulty: easy
    has_grader: true
    grader:
      module: tasks.task1.grader
      function: grade
  - id: task2
    name: causal_ablation
    title: Causal Ablation
    description: Identify the hidden neuron responsible for the multiplicative circuit.
    difficulty: medium
    has_grader: true
    grader:
      module: tasks.task2.grader
      function: grade
  - id: task3
    name: fourier_analysis
    title: Fourier Analysis
    description: Recover the planted frequencies from the embedding spectrum.
    difficulty: hard
    has_grader: true
    grader:
      module: tasks.task3.grader
      function: grade
  - id: task4
    name: additive_bypass_attribution
    title: Additive Bypass Attribution
    description: Identify the hidden neuron that directly carries the additive x3 bypass.
    difficulty: medium
    has_grader: true
    grader:
      module: tasks.task4.grader
      function: grade
grader:
  module: tasks.graders
  function: grade_task
